<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>NAAULU Live — Rainfall Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    .logo {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: #10b981;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select {
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      padding: 0.4rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }

    select:hover { border-color: #10b981; }
    select:focus { border-color: #10b981; }

    .duration-btns {
      display: flex;
      gap: 0;
    }

    .duration-btn {
      background: #0f172a;
      color: #94a3b8;
      border: 1px solid #475569;
      padding: 0.4rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .duration-btn:first-child { border-radius: 0.375rem 0 0 0.375rem; }
    .duration-btn:last-child { border-radius: 0 0.375rem 0.375rem 0; }
    .duration-btn:not(:first-child) { border-left: none; }

    .duration-btn:hover { background: #1e293b; color: #e2e8f0; }

    .duration-btn.active {
      background: #10b981;
      color: white;
      border-color: #10b981;
    }

    /* Image viewer */
    .viewer {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #0f172a;
    }

    .viewer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .viewer .empty {
      color: #64748b;
      font-size: 1.2rem;
    }

    /* Info bar */
    .infobar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 0.5rem 1.5rem;
      background: #1e293b;
      border-top: 1px solid #334155;
      font-size: 0.8rem;
      color: #94a3b8;
      flex-shrink: 0;
    }

    .infobar span { white-space: nowrap; }

  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">NAAULU LIVE</span>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Country</label>
      <select id="country-select">
        <option disabled selected>Loading...</option>
      </select>
    </div>
    <div class="control-group">
      <label>Duration</label>
      <div class="duration-btns">
        <button class="duration-btn active" data-duration="5min">5 min</button>
        <button class="duration-btn" data-duration="hourly">Hourly</button>
        <button class="duration-btn" data-duration="daily">Daily</button>
      </div>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <span class="empty" id="empty-msg">No images available</span>
    <img id="current-image" style="display:none" alt="Rainfall map">
  </div>

  <div class="infobar">
    <span>Image <strong id="pos-current">0</strong> of <strong id="pos-total">0</strong></span>
  </div>

  <script>
    const API_BASE = ".";
    const DURATION_MAP = { "5min": "pt5m", "hourly": "pt1h", "daily": "p1d" };
    let allFiles = [];
    let files = [];
    let index = -1;

    const countrySelect = document.getElementById("country-select");
    const durationBtns = document.querySelectorAll(".duration-btn");
    const img = document.getElementById("current-image");
    const emptyMsg = document.getElementById("empty-msg");
    const posCurrent = document.getElementById("pos-current");
    const posTotal = document.getElementById("pos-total");

    let activeDuration = "5min";

    function getCountry() { return countrySelect.value; }

    async function loadCountries() {
      try {
        const resp = await fetch(`${API_BASE}/countries.json?t=${Date.now()}`);
        if (!resp.ok) throw new Error(resp.status);
        const countries = await resp.json();
        countrySelect.innerHTML = "";
        countries.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.code;
          opt.textContent = c.name;
          countrySelect.appendChild(opt);
        });
      } catch {
        countrySelect.innerHTML = '<option disabled selected>No countries found</option>';
      }
    }

    function filterFiles() {
      const duration = DURATION_MAP[activeDuration];
      files = allFiles.filter(f =>
        f.endsWith(".png") &&
        f.includes(`.${duration}.`)
      );
      files.sort();
    }

    async function loadIndex() {
      const country = getCountry();
      try {
        const resp = await fetch(`${API_BASE}/${country}.json?t=${Date.now()}`);
        if (!resp.ok) throw new Error(resp.status);
        allFiles = await resp.json();
      } catch {
        allFiles = [];
      }
      filterFiles();
      posTotal.textContent = files.length;
      if (files.length > 0) {
        index = files.length - 1;
        showImage();
      } else {
        index = -1;
        img.style.display = "none";
        emptyMsg.style.display = "";
        posCurrent.textContent = "0";
      }
    }

    function showImage() {
      if (index < 0 || index >= files.length) return;
      const filename = files[index];
      img.src = `${API_BASE}/${filename}`;
      img.style.display = "";
      emptyMsg.style.display = "none";
      posCurrent.textContent = index + 1;
    }

    // Duration buttons
    durationBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        durationBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeDuration = btn.dataset.duration;
        filterFiles();
        posTotal.textContent = files.length;
        if (files.length > 0) {
          index = files.length - 1;
          showImage();
      } else {
        index = -1;
        img.style.display = "none";
        emptyMsg.style.display = "";
        posCurrent.textContent = "0";
      }
      });
    });

    // Country select
    countrySelect.addEventListener("change", () => {
      loadIndex();
    });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && index > 0) { index--; showImage(); e.preventDefault(); }
      if (e.key === "ArrowRight" && index < files.length - 1) { index++; showImage(); e.preventDefault(); }
    });

    // Initial load
    loadCountries().then(() => loadIndex());
  </script>
</body>
</html>
